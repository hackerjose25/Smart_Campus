<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Complaint — Smart Campus Portal</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>
<div id="toast"></div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">🎓</div>
      <div class="sidebar-brand">Smart<span>Campus</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a href="student-dashboard.html" class="nav-item">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="complaint.html" class="nav-item active">
        <span class="nav-icon">📢</span><span class="nav-label">Raise Complaint</span>
      </a>
      <a href="lab-booking.html" class="nav-item">
        <span class="nav-icon">💻</span><span class="nav-label">Lab Booking</span>
      </a>
      <a href="leave.html" class="nav-item">
        <span class="nav-icon">📝</span><span class="nav-label">Leave / OD</span>
      </a>
      <a href="track.html" class="nav-item">
        <span class="nav-icon">📊</span><span class="nav-label">Track Requests</span>
      </a>
      <div class="sidebar-section-label" style="margin-top:20px">Account</div>
      <a href="login.html" class="nav-item logout">
        <span class="nav-icon">🚪</span><span class="nav-label">Logout</span>
      </a>
    </div>
    <div class="sidebar-user">
      <div class="user-chip">
        <div class="user-avatar" id="avatarInitial">S</div>
        <div class="user-info">
          <div class="user-name" id="userEmail">Student</div>
          <div class="user-role">Student Account</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Raise a Complaint</div>
      <div class="topbar-right">
        <span class="topbar-badge">📢 Support</span>
      </div>
    </header>

    <div class="page-body">
      <div class="page-header animate-in">
        <h2>Submit a Complaint</h2>
        <p>Report any campus issue and we'll get it resolved promptly.</p>
      </div>

      <div class="form-panel animate-in">
        <form onsubmit="submitComplaint(event)">
          <div class="form-group">
            <label class="form-label">Complaint Title</label>
            <input id="title" type="text" class="form-control" placeholder="e.g. WiFi not working in Block A" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="category" class="form-control">
              <option>Electricity</option>
              <option>WiFi</option>
              <option>Lab Equipment</option>
              <option>Cleanliness</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input id="location" type="text" class="form-control" placeholder="e.g. CS Lab, Block B, Floor 2" required>
          </div>
          <div class="form-group" style="margin-bottom:24px">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control" placeholder="Describe the issue in detail…" rows="4"></textarea>
          </div>
          <button class="btn btn-primary">📤 Submit Complaint</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
const email = localStorage.getItem('email');
if (email) {
  document.getElementById('userEmail').textContent = email;
  document.getElementById('avatarInitial').textContent = email[0].toUpperCase();
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function submitComplaint(event) {
  event.preventDefault();
  const title       = document.getElementById('title').value;
  const category    = document.getElementById('category').value;
  const description = document.getElementById('description').value;
  const location    = document.getElementById('location').value;
  const studentEmail = localStorage.getItem('email');
  try {
    const res = await fetch('/api/complaints', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, category, description, location, studentEmail })
    });
    if (res.ok) {
      showToast('✅ Complaint submitted successfully!', 'success');
      event.target.reset();
    } else {
      showToast('Failed to submit. Please try again.', 'error');
    }
  } catch {
    showToast('✅ Complaint submitted! (offline mode)', 'success');
    event.target.reset();
  }
}
</script>
<script src="js/mobile.js"></script>
</body>
</html>
