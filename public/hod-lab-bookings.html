<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOD Lab Bookings — Smart Campus Portal</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>
<div id="toast"></div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">👨‍🏫</div>
      <div class="sidebar-brand">Smart<span>HOD</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Management</div>
      <a href="hod-dashboard.html" class="nav-item">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="hod-leaves.html" class="nav-item">
        <span class="nav-icon">📝</span><span class="nav-label">Leave Requests</span>
      </a>
      <a href="hod-complaints.html" class="nav-item">
        <span class="nav-icon">📢</span><span class="nav-label">Complaints</span>
      </a>
      <a href="hod-lab-bookings.html" class="nav-item active">
        <span class="nav-icon">💻</span><span class="nav-label">Lab Bookings</span>
      </a>
      <div class="sidebar-section-label" style="margin-top:20px">Account</div>
      <a href="login.html" class="nav-item logout">
        <span class="nav-icon">🚪</span><span class="nav-label">Logout</span>
      </a>
    </div>
    <div class="sidebar-user">
      <div class="user-chip">
        <div class="user-avatar" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">H</div>
        <div class="user-info">
          <div class="user-name">HOD</div>
          <div class="user-role">HOD Account</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">View Lab Bookings</div>
      <div class="topbar-right">
        <span class="topbar-badge" style="background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:#60a5fa">👨‍🏫 HOD</span>
        <span class="topbar-time" id="clock"></span>
      </div>
    </header>

    <div class="page-body">
      <div class="page-header animate-in">
        <h2>Lab & Room Bookings 💻</h2>
        <p>Review incoming requests for lab reservations (View-only for HOD).</p>
      </div>

      <div class="panel animate-in">
        <div class="panel-header">
          <h3>All Lab Bookings</h3>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Lab/Facility</th>
                <th>Schedule</th>
                <th>Purpose</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="dataTable">
              <!-- JS loads data -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 1000);

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function badgeFor(status) {
  const s = (status || '').toLowerCase();
  if (s === 'resolved') return `<span class="badge badge-resolved">Resolved</span>`;
  if (s === 'approved') return `<span class="badge badge-approved">Approved</span>`;
  if (s === 'rejected') return `<span class="badge badge-rejected">Rejected</span>`;
  return `<span class="badge badge-pending">Pending</span>`;
}

async function loadData() {
  try {
    const res = await fetch('/api/lab-bookings');
    if (!res.ok) throw new Error();
    const data = await res.json();
    const rows = data.map(item => `
      <tr>
        <td style="color:var(--text-primary);font-weight:600">${item.studentEmail || '—'}</td>
        <td style="font-weight:600">${item.lab || '—'}</td>
        <td>
          <div style="color:var(--text-primary)">📅 ${item.date ? new Date(item.date).toLocaleDateString() : '—'}</div>
          <div style="font-size:0.75rem;color:var(--primary-light);margin-top:2px">⏰ ${item.timeSlot || '—'}</div>
        </td>
        <td style="max-width:200px">${item.purpose || '—'}</td>
        <td id="status-${item._id}">${badgeFor(item.status)}</td>
      </tr>`).join('');
    document.getElementById('dataTable').innerHTML = rows || '<tr><td colspan="5" style="text-align:center">No bookings found.</td></tr>';
  } catch (err) {
    showToast('Failed to load data from server.', 'error');
  }
}

loadData();
</script>
<script src="js/mobile.js"></script>
</body>
</html>
